name: DateCard
options:
  bundleIdPrefix: com.datecard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"
  StreamChatSwiftUI:
    url: https://github.com/GetStream/stream-chat-swiftui
    from: "4.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DateCard:
    type: application
    platform: iOS
    sources:
      - path: DateCard
        excludes:
          - "Config/*.xcconfig"
    configFiles:
      Debug: DateCard/Config/Debug.xcconfig
      Release: DateCard/Config/Release.xcconfig
    settings:
      base:
        INFOPLIST_FILE: DateCard/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.datecard.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: DateCard/DateCard.entitlements
    dependencies:
      - package: Supabase
      - package: Kingfisher
      - package: StreamChatSwiftUI
        product: StreamChatSwiftUI
    resources:
      - DateCard/Resources/Assets.xcassets
      - DateCard/Resources/PrivacyInfo.xcprivacy

  DateCardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DateCardTests
    dependencies:
      - target: DateCard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/DateCard.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DateCard
